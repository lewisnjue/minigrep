name: build-release-binaries

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag name for release'
        required: false
        default: ''
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build release binaries
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: minigrep-linux
            binary_name: minigrep        
          - os: macos-latest
            artifact_name: minigrep-macos
            binary_name: minigrep        
          - os: windows-latest
            artifact_name: minigrep-windows
            binary_name: minigrep.exe    

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build release binary
        run: cargo build --release

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: target/release/${{ matrix.binary_name }}

  create-release:
    name: Create GitHub release
    needs: build
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ github.event.inputs.tag != '' && github.event.inputs.tag || github.ref_name }}
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Create and Populate GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: Release ${{ env.RELEASE_TAG }}
          body: |
            Initial release of minigrep.
            Binaries for Linux, macOS, and Windows are included.
          files: |
            release-artifacts/minigrep-linux/minigrep
            release-artifacts/minigrep-macos/minigrep
            release-artifacts/minigrep-windows/minigrep.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
