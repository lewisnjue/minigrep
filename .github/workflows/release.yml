name: build-release-binaries

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag name for release'
        required: false
        default: ''
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build release binaries
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            binary_name: minigrep
            release_name: minigrep-linux
          - os: macos-latest
            binary_name: minigrep
            release_name: minigrep-macos
          - os: windows-latest
            binary_name: minigrep.exe
            release_name: minigrep-windows.exe

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build release binary
        run: cargo build --release

      # Fix: Rename the binary immediately so it doesn't collide with other OS builds
      - name: Rename binary for uniqueness
        shell: bash
        run: |
          mv target/release/${{ matrix.binary_name }} target/release/${{ matrix.release_name }}

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.release_name }}
          path: target/release/${{ matrix.release_name }}

  create-release:
    name: Create GitHub release
    needs: build
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ github.event.inputs.tag != '' && github.event.inputs.tag || github.ref_name }}
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Create and Populate GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: Release ${{ env.RELEASE_TAG }}
          body: |
            Official release of minigrep.
            Pre-compiled binaries for Linux, macOS, and Windows are attached below.
          files: |
            release-artifacts/*/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
