name: build-release-binaries

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build:
    name: Build release binaries
    runs-on: ubuntu-latest

    strategy:
      matrix:
        target:
          - x86_64-unknown-linux-gnu
          - x86_64-apple-darwin
          - x86_64-pc-windows-msvc

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          components: rustfmt, clippy
          profile: minimal

      - name: Add target
        run: rustup target add ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: minigre-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/minigre${{ matrix.target == 'x86_64-pc-windows-msvc' && '.exe' || '' }}

  create-release:
    name: Create GitHub release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Create GitHub release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body: |
            Release ${{ github.ref_name }} of minigre.
            Binaries for Linux, macOS, and Windows are included.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload release assets
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          files: |
            release-artifacts/target/x86_64-unknown-linux-gnu/release/minigre
            release-artifacts/target/x86_64-apple-darwin/release/minigre
            release-artifacts/target/x86_64-pc-windows-msvc/release/minigre.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
